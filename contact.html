<body>   
    <!-- Navigation -->
    <header>
        <div class="logo">DHARSHINI</div>

<!-- contact sec -->
    <section class="contact-section py-5">
    <div class="container">
        <div class="text-center mb-5">
            <h2 class="fw-bold">Contact</h2>
            <div class="line"></div>
            <p class="mt-3">
                If you have any questions, feedback, or would like to collaborate
                on a project, feel free to get in touch!
            </p>
        </div>
        <div class="row g-4">
<!-- Left Side -->
        <div class="col-lg-5">
            <div class="contact-info shadow-sm">
                <div class="info-box">
                    <i class="bi bi-geo-alt"></i>
                    <div>
                        <h5>Address</h5>
                        <p>Chennai, TamilNadu</p>
                    </div>
                </div>
                <div class="info-box">
                    <i class="bi bi-telephone"></i>
                        <div>
                            <h5>Call Us</h5>
                            <p>9884227058</p>
                        </div>
                </div>
                <div class="info-box">
                        <i class="bi bi-envelope"></i>
                        <div>
                            <h5>Email Us</h5>
                            <p>dharshini2878@gmail.com</p>
                        </div>
                </div>
                <iframe
                    src="https://maps.google.com/maps?q=Chennai&t=&z=13&ie=UTF8&iwloc=&output=embed"
                    width="100%"
                    height="250"
                    style="border:0;"
                    allowfullscreen=""
                    loading="lazy">
                </iframe>
            </div>
        </div>
<!-- Right Side -->
        <div class="col-lg-7">
            <form action="https://formsubmit.co/dharshini2878@gmail.com" method="POST">
            <div class="contact-form shadow-sm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Your Name</label>
                            <input type="text" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Your Email</label>
                            <input type="email" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label>Subject</label>
                        <input type="text" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>Message</label>
                        <textarea rows="7" class="form-control"></textarea>
                    </div>
                    <div class="text-center">
                        <button type="submit"            class="btnbtn-success">
                        Send Message
                        </button>
                    </div>
            </form>
                </div>
            </div>
        </div>
    </div>
</section>
   
</body>
